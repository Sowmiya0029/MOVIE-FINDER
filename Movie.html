<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFinder</title>
    <style>
        body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0f0f0f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#111;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:320px;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.card h2{
    color:red;
    margin-bottom:20px;
}

#moviename{
    width:100%;
    padding:10px;
    border-radius:5px;
    border:none;
    margin-bottom:15px;
    font-size:14px;
}

#fetch{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

#fetch:hover{
    background:#cc0000;
}

#poster{
    width:100%;
    margin-top:15px;
    border-radius:5px;
}

#info{
    color:white;
    margin-top:10px;
}

#error{
    color:#ff4d4d;
    margin-top:10px;
}

#id{
    color:gray;
    font-size:12px;
    margin-top:10px;
}
    </style>
</head>
<body>

   <div class="card">
    <h2>MOVIE FINDER</h2>
    <input id="moviename" placeholder="Serch Movie">
    <button id="fetch"> FIND MOVIE</button>

    <div id="error"></div>
    <img id="poster" alt="Movie poster"/>
    <div id="info"></div>
    <div id="hint"> Press Enter to watch</div>
   </div>
   <script src="index.js"></script>
</body>
</html>
